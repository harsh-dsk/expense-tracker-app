<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Expense Tracker Dashboard</title>
    <meta
      name="description"
      content="Expense Tracker Dashboard helps you monitor daily spending, manage monthly budgets, analyze categories, and stay on top of your finances with a modern dark interface."
    />
    <meta name="application-name" content="Expense Tracker Dashboard" />
    <meta name="author" content="Expense Tracker" />
    <meta name="theme-color" content="#09090b" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Expense Tracker Dashboard" />
    <meta property="og:title" content="Expense Tracker Dashboard" />
    <meta
      property="og:description"
      content="Track spending, budgets, and analytics in one modern finance app."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:alt" content="Expense Tracker Dashboard preview" />
    <meta property="og:locale" content="en_IN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Expense Tracker Dashboard" />
    <meta
      name="twitter:description"
      content="Track spending, budgets, and analytics in one modern finance app."
    />
    <meta name="twitter:image" content="/og-image.svg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        background: #09090b;
        color: #fafafa;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #09090b;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      #app-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-loader-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .app-loader-mark {
        width: 3rem;
        height: 3rem;
        border-radius: 0.9rem;
        background: linear-gradient(135deg, #34d399, #0d9488);
        box-shadow: 0 10px 30px rgba(16, 185, 129, 0.25);
        animation: loader-pulse 1.2s ease-in-out infinite;
      }

      .app-loader-text {
        font: 600 0.95rem/1.4 Inter, system-ui, -apple-system, Segoe UI, sans-serif;
        letter-spacing: 0.01em;
        color: #a1a1aa;
      }

      @keyframes loader-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.96);
          opacity: 0.85;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <div class="app-loader-card">
        <div class="app-loader-mark"></div>
        <p class="app-loader-text">Loading Expense Tracker Dashboard…</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
